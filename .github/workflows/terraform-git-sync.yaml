name: Terraform For Git Sync

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Select the environment to deploy to
        options:
        - sandbox
        - production
        default: sandbox
  push:
    branches:
    - dev
    - main
    paths:
    - grafana/git-sync/terraform/**
    - .github/terraform-git-sync/**
env:
  TF_VERSION: 1.15.5

jobs:
  terraform:
    permissions: write-all
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Configure Common Variables
      run: |
        echo "GITHUB_REPO_URL="https://github.com/bcgov/sso-grafana-dashboards"" >> $GITHUB_ENV
        echo "GITHUB_REPO_BRANCH=main" >> $GITHUB_ENV

    - name: Configure Sandbox Variables
      if: github.event.inputs.environment == 'sandbox'
      run: |
        echo "TERRAFORM_DEPLOY_ROLE_ARN=${{ secrets.TERRAFORM_DEPLOY_ROLE_ARN_DEV }}" >> $GITHUB_ENV
        echo "S3_BACKEND_NAME=grafana-git-sync-sandbox-tfstate" >> $GITHUB_ENV
        echo "GITHUB_REPO_PATH=/apps/sso/environments/sandbox" >> $GITHUB_ENV
        echo "GITHUB_REPO_SYNC_INTERVAL_SECONDS=3600" >> $GITHUB_ENV
        echo "GRAFANA_URL="https://sso-grafana-sandbox.apps.gold.devops.gov.bc.ca"" >> $GITHUB_ENV
        echo "GRAFANA_SERVICE_ACCOUNT_TOKEN=${{ secrets.SANDBOX_SSO_GRAFANA_SERVICE_ACCOUNT_TOKEN }}" >> $GITHUB_ENV

    - name: Configure Production Variables
      if: github.event.inputs.environment == 'production'
      run: |
        echo "TERRAFORM_DEPLOY_ROLE_ARN=${{ secrets.TERRAFORM_DEPLOY_ROLE_ARN_PROD }}" >> $GITHUB_ENV
        echo "S3_BACKEND_NAME=grafana-git-sync-production-tfstate" >> $GITHUB_ENV
        echo "GITHUB_REPO_PATH=/apps/sso/environments/production" >> $GITHUB_ENV
        echo "GITHUB_REPO_SYNC_INTERVAL_SECONDS=3600" >> $GITHUB_ENV
        echo "GRAFANA_URL="https://sso-grafana.apps.gold.devops.gov.bc.ca"" >> $GITHUB_ENV
        echo "GRAFANA_SERVICE_ACCOUNT_TOKEN=${{ secrets.PROD_SSO_GRAFANA_SERVICE_ACCOUNT_TOKEN }}" >> $GITHUB_ENV

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ env.TERRAFORM_DEPLOY_ROLE_ARN }}
        aws-region: ca-central-1

    - name: Terraform Initialize
      working-directory: grafana/git-sync/terraform
      run: terraform init

    - name: Terraform Init
      working-directory: ./grafana/git-sync/terraform
      run: |
        cat <<EOF > backend.hcl
        bucket = "${{ env.S3_BACKEND_NAME }}"
        key = "tf-state"
        region = "ca-central-1"
        EOF
        terraform init -backend-config=backend.hcl

    - name: Terraform Variables
      working-directory: ./grafana/git-sync/terraform
      run: |
        cat >"ci.auto.tfvars" <<EOF
          github_app_id = "${{ secrets.GIT_SYNC_GITHUB_APP_ID }}"
          github_app_installation_id = "${{ secrets.GIT_SYNC_GITHUB_APP_INSTALLATION_ID }}"
          github_app_private_key_b64_encoded = "${{ secrets.GIT_SYNC_GITHUB_APP_PRIVATE_KEY_B64_ENCODED }}"
          repo_url = "${{ env.GITHUB_REPO_URL }}"
          repo_branch = "${{ env.GITHUB_REPO_BRANCH }}"
          repo_path = "${{ env.GITHUB_REPO_PATH }}"
          repo_sync_interval_seconds = "${{ env.GITHUB_REPO_SYNC_INTERVAL_SECONDS }}"
          grafana_url = "${{ env.GRAFANA_URL }}"
          grafana_service_account_token = "${{ env.GRAFANA_SERVICE_ACCOUNT_TOKEN }}"
        EOF

    - name: Terraform Plan
      run: terraform plan -no-color
      working-directory: ./grafana/git-sync/terraform

    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: ./grafana/git-sync/terraform
