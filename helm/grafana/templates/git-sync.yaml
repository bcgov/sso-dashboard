{{- if .Values.gitSync.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "sso-grafana.fullname" . }}-git-sync
  labels:
    {{- include "sso-grafana.labels" . | nindent 4 }}
    app.kubernetes.io/component: git-sync
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: {{ .Values.gitSync.persistence.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.gitSync.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sso-grafana.fullname" . }}-git-sync
  labels:
    {{- include "sso-grafana.labels" . | nindent 4 }}
    app.kubernetes.io/component: git-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "sso-grafana.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: git-sync
  template:
    metadata:
      labels:
        {{- include "sso-grafana.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: git-sync
    spec:
      containers:
        - name: git-sync
          image: "{{ .Values.gitSync.image.repository }}:{{ .Values.gitSync.image.tag }}"
          imagePullPolicy: {{ .Values.gitSync.image.pullPolicy }}
          args:
            - --repo={{ .Values.gitSync.repo }}
            - --branch={{ .Values.gitSync.branch }}
            - --depth={{ .Values.gitSync.depth }}
            - --period={{ .Values.gitSync.period }}
            - --root=/git
            - --link=current
            - --github-app-id={{ .Values.gitSync.githubApp.appId }}
            - --github-app-installation-id={{ .Values.gitSync.githubApp.installationId }}
            - --github-app-private-key-file=/etc/github-app/{{ .Values.gitSync.githubApp.privateKeySecretKey }}
          resources:
            {{- toYaml .Values.gitSync.resources | nindent 12 }}
          securityContext:
            runAsUser: 65533
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: git-data
              mountPath: /git
            - name: github-app-key
              mountPath: /etc/github-app
              readOnly: true
      volumes:
        - name: git-data
          persistentVolumeClaim:
            claimName: {{ include "sso-grafana.fullname" . }}-git-sync
        - name: github-app-key
          secret:
            secretName: {{ .Values.gitSync.githubApp.privateKeySecret }}
            defaultMode: 0400
{{- end }}
